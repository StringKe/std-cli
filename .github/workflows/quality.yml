name: quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Dylint Rust toolchain
        run: rustup toolchain install nightly-2025-09-18 --component rustc-dev --component llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install quality tools
        run: |
          cargo install cargo-dylint --version 5.0.0 --locked
          cargo install dylint-link --version 5.0.0 --locked
          cargo install cargo-deny --locked
          cargo install cargo-machete --locked

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Dylint
        run: DYLINT_RUSTFLAGS="-D warnings" cargo dylint --workspace --all -- --all-targets

      - name: Dylint lint tests
        run: cargo +nightly-2025-09-18 test --manifest-path crates/file_too_long/Cargo.toml

      - name: Tests
        run: cargo test --workspace -- --test-threads=1

      - name: Cargo deny
        run: cargo deny check

      - name: Cargo machete
        run: cargo machete
