name: quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install Dylint Rust toolchain
        run: rustup toolchain install nightly-2025-09-18 --component rustc-dev --component llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install quality tools
        run: |
          cargo install cargo-dylint --version 5.0.0 --locked
          cargo install dylint-link --version 5.0.0 --locked
          cargo install cargo-deny --locked
          cargo install cargo-machete --locked

      - name: Quality
        run: mise run quality
