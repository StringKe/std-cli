[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "transitive deno_core bincode 1.3.3 advisory has no safe upgrade; deno_core plugin runtime remains required for v1.0" },
    { id = "RUSTSEC-2024-0436", reason = "transitive deno_core and accesskit use paste; no direct workspace dependency" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
